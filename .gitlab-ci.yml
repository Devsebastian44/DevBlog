stages:
  - install
  - lint
  - test
  - build
  - security

variables:
  NODE_VERSION: "lts/*"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
    - node_modules/

install_dependencies:
  stage: install
  image: node:22-alpine
  script:
    - npm ci

lint_code:
  stage: lint
  image: node:22-alpine
  script:
    - npm run lint || echo "Linting skipped or failed (Needs configuration)"
  allow_failure: true

run_tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.40.0-jammy
  script:
    - npm i -g @playwright/test
    - npm run test --if-present
  allow_failure: true

build_astro:
  stage: build
  image: node:22-alpine
  script:
    - npm run build
  artifacts:
    paths:
      - dist/

security_audit:
  stage: security
  image: node:22-alpine
  script:
    - npm audit --production
  allow_failure: true
